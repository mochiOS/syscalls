[driver]
id = "com.mnu.plugkit.test.null"
name = "Null PlugKit Test Driver"
version = "0.1.0"
description = "Test driver used to validate PlugKit IPC and lifecycle wiring."
developer = "mnu"
entry = "entry.elf"

[plugkit]
api = "1"
driver_class = "other"

[[match]]
bus = "platform"
vendor_id = "0x0000"
device_id = "0x0000"

[capabilities]
requires = [
    "ipc.client",
    "ipc.server"
]

[provides]
interfaces = [ "plugkit.test.null" ]
